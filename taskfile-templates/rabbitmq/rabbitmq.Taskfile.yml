# RabbitMQ Taskfile template
# Installed to: .devtools/rabbitmq/rabbitmq.Taskfile.yml
# Included by: .devtools/Taskfile.yml as namespace 'rabbitmq'
# Usage: task rabbitmq:up | task rabbitmq:down | task rabbitmq:logs | task rabbitmq:restart
# Management UI is always-on (bundled in management image) — no separate up-ui needed
# but up-ui is included for consistency; it activates the ui profile (no-op for RabbitMQ)

version: '3'

tasks:

  up:
    desc: Start RabbitMQ with management UI on RABBITMQ_UI_PORT
    cmds:
      - docker compose -f .devtools/rabbitmq/rabbitmq.compose.yml --profile services up -d --remove-orphans

  up-ui:
    desc: Start RabbitMQ (management UI is always-on — equivalent to up)
    cmds:
      - task: up

  up-monitoring:
    desc: Start RabbitMQ + metrics exporter
    cmds:
      - docker compose -f .devtools/rabbitmq/rabbitmq.compose.yml --profile services --profile monitoring up -d --remove-orphans

  down:
    desc: Stop RabbitMQ and all its companions
    cmds:
      - docker compose -f .devtools/rabbitmq/rabbitmq.compose.yml down

  logs:
    desc: Follow RabbitMQ container logs
    cmds:
      - docker compose -f .devtools/rabbitmq/rabbitmq.compose.yml logs -f rabbitmq

  restart:
    desc: Restart RabbitMQ container
    cmds:
      - docker compose -f .devtools/rabbitmq/rabbitmq.compose.yml restart rabbitmq

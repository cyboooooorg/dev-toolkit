# Root Taskfile template
# Installed to: .devtools/Taskfile.yml
# Add to your project root Taskfile.yml:
#   includes:
#     devtools:
#       dir: .devtools
#       taskfile: ./.devtools/Taskfile.yml
#       optional: true
# Then access services as: task devtools:redis:up

version: "3"

includes:
  redis:
    taskfile: redis/redis.Taskfile.yml
    optional: true # Silently ignored if Redis is not installed
  rabbitmq:
    taskfile: rabbitmq/rabbitmq.Taskfile.yml
    optional: true
  postgres:
    taskfile: postgres/postgres.Taskfile.yml
    optional: true
  mysql:
    taskfile: mysql/mysql.Taskfile.yml
    optional: true
  mongodb:
    taskfile: mongodb/mongodb.Taskfile.yml
    optional: true
  monitoring:
    taskfile: monitoring/monitoring.Taskfile.yml
    optional: true

tasks:
  up:
    desc: Start all installed services (skips services not yet installed)
    cmds:
      - docker compose -f {{.TASKFILE_DIR}}/compose.yml up -d --remove-orphans

  down:
    desc: Stop all installed services
    cmds:
      - docker compose -f {{.TASKFILE_DIR}}/compose.yml down --remove-orphans

  up-ui:
    desc: Start all installed services with their UI companions
    cmds:
      - docker compose -f {{.TASKFILE_DIR}}/compose.yml --profile ui up -d --remove-orphans

  up-monitoring:
    desc: Start all installed services with their metrics exporters + central monitoring stack
    cmds:
      - docker compose -f {{.TASKFILE_DIR}}/compose.yml --profile monitoring up -d --remove-orphans

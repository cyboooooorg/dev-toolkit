# PostgreSQL Taskfile template
# Installed to: .devtools/postgres/postgres.Taskfile.yml
# Included by: .devtools/Taskfile.yml as namespace 'postgres'
# Usage: task postgres:up | task postgres:down | task postgres:logs | task postgres:restart

version: '3'

tasks:

  up:
    desc: Start PostgreSQL (main service)
    cmds:
      - docker compose -f .devtools/postgres/postgres.compose.yml --profile services up -d --remove-orphans

  up-ui:
    desc: Start PostgreSQL + pgAdmin UI on POSTGRES_UI_PORT
    cmds:
      - docker compose -f .devtools/postgres/postgres.compose.yml --profile services --profile ui up -d --remove-orphans

  up-monitoring:
    desc: Start PostgreSQL + postgres_exporter
    cmds:
      - docker compose -f .devtools/postgres/postgres.compose.yml --profile services --profile monitoring up -d --remove-orphans

  down:
    desc: Stop PostgreSQL and all its companions
    cmds:
      - docker compose -f .devtools/postgres/postgres.compose.yml down

  logs:
    desc: Follow PostgreSQL container logs
    cmds:
      - docker compose -f .devtools/postgres/postgres.compose.yml logs -f postgres

  restart:
    desc: Restart PostgreSQL container
    cmds:
      - docker compose -f .devtools/postgres/postgres.compose.yml restart postgres

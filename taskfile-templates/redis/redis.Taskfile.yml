# Redis Taskfile template
# Installed to: .devtools/redis/redis.Taskfile.yml
# Included by: .devtools/Taskfile.yml as namespace 'redis'
# Usage: task redis:up | task redis:down | task redis:logs | task redis:restart
# Tasks always run from project root — compose files referenced as .devtools/<file>

version: '3'

tasks:

  up:
    desc: Start Redis (main service)
    cmds:
      - docker compose -f .devtools/redis/redis.compose.yml --profile services up -d --remove-orphans

  up-ui:
    desc: Start Redis + RedisInsight UI
    cmds:
      - docker compose -f .devtools/redis/redis.compose.yml --profile services --profile ui up -d --remove-orphans

  up-monitoring:
    desc: Start Redis + metrics exporter
    cmds:
      - docker compose -f .devtools/redis/redis.compose.yml --profile services --profile monitoring up -d --remove-orphans

  down:
    desc: Stop Redis and all its companions
    cmds:
      - docker compose -f .devtools/redis/redis.compose.yml down

  logs:
    desc: Follow Redis container logs
    cmds:
      - docker compose -f .devtools/redis/redis.compose.yml logs -f redis

  restart:
    desc: Restart Redis container
    cmds:
      - docker compose -f .devtools/redis/redis.compose.yml restart redis

# PostgreSQL service template
# Installed to: .devtools/postgres.compose.yml
# Profiles: services (default), ui (opt-in), monitoring (opt-in)
# Credentials: all via env_file .env — never hardcoded here

services:

  postgres:
    image: postgres:${POSTGRES_VERSION}-alpine
    profiles:
      - services
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-postgres
    env_file:
      - .env
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - postgres_net
      - services
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - ui
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-pgadmin
    ports:
      - "127.0.0.1:${POSTGRES_UI_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    # No volumes — ephemeral by design
    networks:
      - postgres_net
    restart: unless-stopped

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    profiles:
      - monitoring
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    # No volumes — ephemeral by design
    networks:
      - postgres_net
      - monitoring
    restart: unless-stopped

volumes:
  postgres_data:
    # Plain name — Docker auto-prefixes with COMPOSE_PROJECT_NAME at runtime

networks:
  postgres_net:
    name: ${COMPOSE_PROJECT_NAME:-devtools}_postgres
  services:
    name: ${COMPOSE_PROJECT_NAME:-devtools}_services
  monitoring:
    name: ${COMPOSE_PROJECT_NAME:-devtools}_monitoring

# Redis service template
# Installed to: .devtools/redis.compose.yml
# Profiles: services (default), ui (opt-in), monitoring (opt-in)
# Credentials: all via env_file .env — never hardcoded here

services:

  redis:
    image: redis:${REDIS_VERSION}-alpine
    profiles:
      - services
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-redis
    env_file:
      - .env
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - redis_net
      - services
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    profiles:
      - ui
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-redisinsight
    ports:
      - "127.0.0.1:${REDIS_UI_PORT}:5540"
    environment:
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_USERNAME: default
      RI_REDIS_PASSWORD: ${REDIS_PASSWORD}
    # No volumes — ephemeral by design (UI config is per-session)
    networks:
      - redis_net
    restart: unless-stopped

  redis_exporter:
    image: oliver006/redis_exporter:latest
    profiles:
      - monitoring
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-redis-exporter
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    # No volumes — ephemeral by design
    networks:
      - redis_net
      - monitoring
    restart: unless-stopped

volumes:
  redis_data:
    # Plain name — Docker auto-prefixes with COMPOSE_PROJECT_NAME at runtime
    # Result: <COMPOSE_PROJECT_NAME>_redis_data

networks:
  redis_net:
    name: ${COMPOSE_PROJECT_NAME:-devtools}_redis
  services:
    # Regular bridge — NOT external: true. Docker is idempotent across
    # duplicate named network declarations when compose files are included.
    name: ${COMPOSE_PROJECT_NAME:-devtools}_services
  monitoring:
    name: ${COMPOSE_PROJECT_NAME:-devtools}_monitoring

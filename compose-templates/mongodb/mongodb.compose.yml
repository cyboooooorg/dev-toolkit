# MongoDB service template
# Installed to: .devtools/mongodb.compose.yml
# Profiles: services (default), ui (opt-in), monitoring (opt-in)
# Credentials: all via env_file .env — never hardcoded here

services:

  mongodb:
    image: mongo:${MONGODB_VERSION}
    profiles:
      - services
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-mongodb
    env_file:
      - .env
    ports:
      - "127.0.0.1:${MONGODB_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    healthcheck:
      # mongosh is required — the legacy `mongo` CLI was removed in MongoDB 6+
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mongodb_net
      - services
    restart: unless-stopped

  mongo_express:
    image: mongo-express:latest
    profiles:
      - ui
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-mongo-express
    ports:
      - "127.0.0.1:${MONGODB_UI_PORT}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/"
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-mexpress}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-mexpress}
    # No volumes — ephemeral by design
    networks:
      - mongodb_net
    restart: unless-stopped

  mongodb_exporter:
    image: percona/mongodb_exporter:latest
    profiles:
      - monitoring
    container_name: ${COMPOSE_PROJECT_NAME:-devtools}-mongodb-exporter
    environment:
      MONGODB_URI: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017"
    # No volumes — ephemeral by design
    networks:
      - mongodb_net
      - monitoring
    restart: unless-stopped

volumes:
  mongodb_data:
    # Plain name — Docker auto-prefixes with COMPOSE_PROJECT_NAME at runtime

networks:
  mongodb_net:
    name: ${COMPOSE_PROJECT_NAME:-devtools}_mongodb
  services:
    name: ${COMPOSE_PROJECT_NAME:-devtools}_services
  monitoring:
    name: ${COMPOSE_PROJECT_NAME:-devtools}_monitoring
